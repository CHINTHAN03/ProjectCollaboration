<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Workspace | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h2>Welcome to Nexus</h2>
        <p class="subtitle">Enter your credentials to access the workspace.</p>

        <form id="loginForm" class="active-form">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="loginUsername" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="primary-btn">Log In</button>
            <p class="toggle-text">Don't have an account? <span onclick="toggleAuth()">Register here</span></p>
            <div id="loginMessage" class="message"></div>
        </form>

        <form id="registerForm" class="hidden-form">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="regUsername" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" required>
            </div>
            <div class="input-group">
                <label>Role</label>
                <select id="regRole">
                    <option value="Developer">Developer</option>
                    <option value="Project Manager">Project Manager</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="primary-btn">Create Account</button>
            <p class="toggle-text">Already have an account? <span onclick="toggleAuth()">Log in</span></p>
            <div id="regMessage" class="message"></div>
        </form>
    </div>
</div>
<script src="js/auth.js"></script>
</body>
</html>
